app = "ai-orchestrator-service-rodmen07"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_PORT = "8081"
  ANTHROPIC_MODEL = "claude-haiku-4-5-20251001"
  REQUEST_TIMEOUT_SECONDS = "30"

[[services]]
  internal_port = 8081
  protocol = "tcp"
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.http_checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "20s"
    method = "get"
    path = "/health"
